<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ── Background ── -->
  <rect width="400" height="400" fill="#0b0b09"/>

  <!-- ── Subtle border ── -->
  <rect x="0.5" y="0.5" width="399" height="399" stroke="#1f1f1d" stroke-width="1"/>

  <!-- ══════════════════════════════════════
       MONOGRAM  KM  —  geometric, bold
       Same visual language as the old mark
       ══════════════════════════════════════ -->

  <!-- K: vertical stem -->
  <rect x="92" y="94" width="30" height="212" fill="#ede8df"/>

  <!-- K: upper diagonal -->
  <polygon points="122,196 182,94 216,94 154,198" fill="#ede8df"/>

  <!-- K: lower diagonal -->
  <polygon points="122,206 156,202 220,306 186,306" fill="#ede8df"/>

  <!-- M: left stem -->
  <rect x="226" y="94" width="28" height="212" fill="#ede8df"/>

  <!-- M: right stem -->
  <rect x="304" y="94" width="28" height="212" fill="#ede8df"/>

  <!-- M: center valleys/diagonals -->
  <polygon points="254,94 278,160 266,222 242,156" fill="#ede8df"/>
  <polygon points="282,160 304,94 332,94 306,172" fill="#ede8df"/>

  <!-- ══════════════════════════════════════
       ACCENT — golden corner mark
       Two short lines forming an L-bracket
       bottom-right quadrant, referencing
       the "fm." dot from the nav logo
       ══════════════════════════════════════ -->

  <!-- Horizontal accent bar -->
  <rect x="248" y="270" width="56" height="8" fill="#e8c94e"/>

  <!-- Vertical accent bar -->
  <rect x="296" y="222" width="8" height="56" fill="#e8c94e"/>

  <!-- Accent corner dot (fills the L corner) -->
  <rect x="296" y="270" width="8" height="8" fill="#e8c94e"/>

</svg>
